image: registry.gitlab.com/kodality/gitlab-builders/ng

stages:
  - build

.release:
  before_script:
    - echo "//kexus.kodality.com/repository/npm/:_authToken=$NEXUS_NPM_TOKEN" > ~/.npmrc
    - echo "@kodality-web:registry=https://kexus.kodality.com/repository/npm/" >> ~/.npmrc
  script:
    - npm install
    - npm run test:ci
    - npm run build
    - npm run publish ${VERSION}

snapshot:
  extends: .release
  stage: build
  only:
    - main

release:
  extends: .release
  stage: build
  variables:
    VERSION: $CI_COMMIT_TAG | xargs
  only:
    - /^r\d*\.\d*\.\d*$/
  except:
    - branches
