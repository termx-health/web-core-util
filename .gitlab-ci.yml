image: registry.gitlab.com/kodality-public/gitlab-builders/gitlab-ci-builder:latest

stages:
  - test
  - build

before_script:
  - echo "//kexus.kodality.com/repository/npm/:_authToken=$NEXUS_NPM_TOKEN" > ~/.npmrc
  - echo "@kodality-web:registry=https://kexus.kodality.com/repository/npm/" >> ~/.npmrc

test:
  stage: test
  script:
    - npm install
    - npm run test-ci
  only:
    - main


snapshot:
  stage: build
  script:
    - npm install
    - npm run build
    - npm run publish
  only:
    - main

release:
  stage: build
  script:
    - npm install
    - npm run build
    - export PACKAGE_VERSION="$CI_COMMIT_TAG"
    - npm run publish $PACKAGE_VERSION
  only:
    - /^r\d*\.\d*\.\d*$/
  except:
    - branches
