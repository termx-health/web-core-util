<m-number-input [name]="name + '-lower'" [(ngModel)]="val.lower" (ngModelChange)="fireOnChange()" [disabled]="disabled | toBoolean"></m-number-input>
<m-number-input [name]="name + '-upper'" [(ngModel)]="val.upper" (ngModelChange)="fireOnChange()" [disabled]="disabled | toBoolean"></m-number-input>
