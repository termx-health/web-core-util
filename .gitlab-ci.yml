image: registry.gitlab.com/kodality/gitlab-builders/ng:13

stages:
  - build

before_script:
  - echo "//kexus.kodality.com/repository/npm/:_authToken=$NEXUS_NPM_TOKEN" > ~/.npmrc
  - echo "@kodality-web:registry=https://kexus.kodality.com/repository/npm/" >> ~/.npmrc


.build_base:
  script:
    - npm install
    - npm run test:ci
    - npm run build
    - npm run publish ${VERSION}


build:
  stage: build
  script:
    - npm install
    - npm run test:ci
    - npm run build
  only:
    - branches
  except:
    - main
    - /^\d*\.\d*.x$/

snapshot:
  extends: .build_base
  stage: build
  only:
    - main
    - /^\d*\.\d*.x$/


release:
  extends: .build_base
  stage: build
  variables:
    VERSION: $CI_COMMIT_TAG | xargs
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d*\.\d*.\d*$/
      when: on_success
    - when: never
